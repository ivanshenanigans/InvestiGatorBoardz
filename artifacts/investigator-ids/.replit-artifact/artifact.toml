kind = "web"
previewPath = "/"
title = "InvestiGator IDs"
version = "1.0.0"
id = "artifacts/investigator-ids"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23617

[services.development]
run = "pnpm --filter @workspace/investigator-ids run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investigator-ids", "run", "build" ]
publicDir = "artifacts/investigator-ids/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23617"
BASE_PATH = "/"
