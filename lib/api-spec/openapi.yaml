openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: Profile operations
  - name: events
    description: Event board operations
  - name: bulletin
    description: Bulletin board operations
  - name: customSkins
    description: Custom skin operations
  - name: customBadges
    description: Custom badge operations
  - name: customBanners
    description: Custom banner operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List all profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileRecord"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a new profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileRecord"
        "409":
          description: Profile limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /profiles/{id}:
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update profile skin, badges, or banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventRecord"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event (moderator)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRecord"

  /events/{id}:
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRecord"

  /bulletin:
    get:
      operationId: listBulletin
      tags: [bulletin]
      summary: List all bulletin items
      responses:
        "200":
          description: List of bulletin items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BulletinRecord"
    post:
      operationId: createBulletinItem
      tags: [bulletin]
      summary: Create a bulletin item (moderator)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulletinInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulletinRecord"

  /bulletin/{id}:
    delete:
      operationId: deleteBulletinItem
      tags: [bulletin]
      summary: Delete a bulletin item (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateBulletinItem
      tags: [bulletin]
      summary: Update a bulletin item (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulletinInput"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulletinRecord"

  /custom-banners:
    get:
      operationId: listCustomBanners
      tags: [customBanners]
      summary: List all custom banners
      responses:
        "200":
          description: List of custom banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomBannerRecord"
    post:
      operationId: createCustomBanner
      tags: [customBanners]
      summary: Create a custom banner (moderator)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomBannerInput"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomBannerRecord"

  /custom-banners/{id}:
    delete:
      operationId: deleteCustomBanner
      tags: [customBanners]
      summary: Delete a custom banner (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /custom-badges:
    get:
      operationId: listCustomBadges
      tags: [customBadges]
      summary: List all custom badges
      responses:
        "200":
          description: List of custom badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomBadgeRecord"
    post:
      operationId: createCustomBadge
      tags: [customBadges]
      summary: Create a custom badge (moderator)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomBadgeInput"
      responses:
        "201":
          description: Created badge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomBadgeRecord"

  /custom-badges/{id}:
    delete:
      operationId: deleteCustomBadge
      tags: [customBadges]
      summary: Delete a custom badge (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /custom-skins:
    get:
      operationId: listCustomSkins
      tags: [customSkins]
      summary: List all custom skins
      responses:
        "200":
          description: List of custom skins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomSkinRecord"
    post:
      operationId: createCustomSkin
      tags: [customSkins]
      summary: Create a custom skin (moderator)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomSkinInput"
      responses:
        "201":
          description: Created skin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomSkinRecord"

  /custom-skins/{id}:
    delete:
      operationId: deleteCustomSkin
      tags: [customSkins]
      summary: Delete a custom skin (moderator)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ProfileRecord:
      type: object
      required: [id, username, displayName, favoriteColor, bio, imageData, ageGroup, badges, skin, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        favoriteColor:
          type: string
        bio:
          type: string
        imageData:
          type: string
        ageGroup:
          type: string
        badges:
          type: array
          items:
            type: string
        skin:
          type: string
        banner:
          type: ["string", "null"]
        createdAt:
          type: string

    ProfileInput:
      type: object
      required: [username, displayName, favoriteColor, bio, imageData, ageGroup]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 30
        displayName:
          type: string
          minLength: 1
          maxLength: 30
        favoriteColor:
          type: string
        bio:
          type: string
          maxLength: 75
        imageData:
          type: string
        ageGroup:
          type: string
        banner:
          type: string

    ProfileUpdate:
      type: object
      properties:
        skin:
          type: string
        badges:
          type: array
          items:
            type: string
        banner:
          type: ["string", "null"]

    EventRecord:
      type: object
      required: [id, title, description, imageData, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        imageData:
          type: string
        createdAt:
          type: string

    EventInput:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        imageData:
          type: string

    BulletinRecord:
      type: object
      required: [id, category, title, content, url, sortOrder, createdAt]
      properties:
        id:
          type: integer
        category:
          type: string
        title:
          type: string
        content:
          type: string
        url:
          type: string
        sortOrder:
          type: string
        createdAt:
          type: string

    BulletinInput:
      type: object
      required: [category, title]
      properties:
        category:
          type: string
        title:
          type: string
        content:
          type: string
        url:
          type: string
        sortOrder:
          type: string

    CustomBannerRecord:
      type: object
      required: [id, name, patternType, primaryColor, secondaryColor, bgColor, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        patternType:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        bgColor:
          type: string
        createdAt:
          type: string

    CustomBannerInput:
      type: object
      required: [name, patternType, primaryColor, secondaryColor, bgColor]
      properties:
        name:
          type: string
          minLength: 1
        patternType:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        bgColor:
          type: string

    CustomBadgeRecord:
      type: object
      required: [id, name, color, accessory, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        accessory:
          type: string
        createdAt:
          type: string

    CustomBadgeInput:
      type: object
      required: [name, color, accessory]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        accessory:
          type: string

    CustomSkinRecord:
      type: object
      required: [id, name, glowColor, glowEnabled, borderColor, bgGradientFrom, bgGradientTo, accessories, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        glowColor:
          type: string
        glowEnabled:
          type: boolean
        borderColor:
          type: string
        bgGradientFrom:
          type: string
        bgGradientTo:
          type: string
        accessories:
          type: array
          items:
            type: string
        createdAt:
          type: string

    CustomSkinInput:
      type: object
      required: [name, glowColor, glowEnabled, borderColor, bgGradientFrom, bgGradientTo, accessories]
      properties:
        name:
          type: string
          minLength: 1
        glowColor:
          type: string
        glowEnabled:
          type: boolean
        borderColor:
          type: string
        bgGradientFrom:
          type: string
        bgGradientTo:
          type: string
        accessories:
          type: array
          items:
            type: string
